<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PW Hardware Validation</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F8FAFC;color:#0F172A;min-height:100vh}

    /* ── Header + Tabs ─────────────────────────────────────── */
    .header{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 24px}
    .header-top{display:flex;align-items:center;justify-content:space-between;padding:16px 0 0}
    .header-title{font-size:15px;font-weight:600}
    .header-sub{font-size:12px;color:#64748B;margin-top:2px}
    .tabs{display:flex;gap:0;margin-top:12px}
    .tab{padding:10px 18px;font-size:13px;font-weight:500;color:#64748B;cursor:pointer;
         border-bottom:2px solid transparent;transition:all 0.15s;user-select:none}
    .tab:hover{color:#0F172A}
    .tab.active{color:#0F172A;border-bottom-color:#0F172A}

    /* ── Panels ────────────────────────────────────────────── */
    .panel{display:none}.panel.active{display:block}
    .inner{max-width:680px;margin:0 auto;padding:28px 20px}
    .inner-wide{max-width:1060px;margin:0 auto;padding:28px 20px}
    h2{font-size:16px;font-weight:600;margin-bottom:4px}
    .sub{font-size:13px;color:#64748B;margin-bottom:24px}

    /* ── Upload zones ──────────────────────────────────────── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .zone{border:1.5px dashed #CBD5E1;border-radius:12px;padding:24px 16px;text-align:center;
          background:#F8FAFC;cursor:pointer;transition:all 0.15s;user-select:none}
    .zone:hover{border-color:#94A3B8}
    .zone.over{border-color:#3B82F6;background:#EFF6FF;border-style:solid}
    .zone.done{border-color:#10B981;background:#F0FDF4;border-style:solid}
    .zone i{font-size:28px;color:#94A3B8;display:block;margin-bottom:8px}
    .zone.done i{color:#10B981}
    .zone-label{font-size:13px;font-weight:500;margin-bottom:3px}
    .zone-hint{font-size:11px;color:#94A3B8}
    .zone-fname{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
    .zone-fsize{font-size:11px;color:#94A3B8}

    #run-btn{width:100%;padding:10px;font-size:13px;font-weight:500;border-radius:8px;
             border:0.5px solid #E2E8F0;background:#fff;color:#94A3B8;
             cursor:not-allowed;margin-bottom:14px;transition:all 0.15s}
    #run-btn.ready{border-color:#A7F3D0;background:#F0FDF4;color:#059669;cursor:pointer}
    #run-btn.ready:hover{opacity:.85}

    /* ── Status cards ──────────────────────────────────────── */
    .card{border:0.5px solid #E2E8F0;border-radius:12px;padding:16px;background:#fff}
    .card.c-info{border-color:#BFDBFE}.card.c-ok{border-color:#A7F3D0}.card.c-err{border-color:#FECACA}
    .card-title{font-size:13px;font-weight:500;margin-bottom:2px}
    .card-sub{font-size:12px;color:#64748B}
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
    .stat-sm{background:#F8FAFC;border-radius:8px;padding:10px 12px}
    .stat-sm .sl{font-size:11px;color:#64748B;margin-bottom:3px}
    .stat-sm .sv{font-size:20px;font-weight:500}

    .btn-ok{display:inline-block;padding:8px 16px;font-size:13px;font-weight:500;border-radius:8px;
            text-decoration:none;border:0.5px solid #A7F3D0;background:#F0FDF4;color:#059669;cursor:pointer}
    .btn-ghost{padding:8px 12px;font-size:12px;border-radius:8px;border:0.5px solid #E2E8F0;
               background:none;color:#64748B;cursor:pointer;margin-left:8px}

    /* ── Queue stats ───────────────────────────────────────── */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
    .stat-card{background:#fff;border:0.5px solid #E2E8F0;border-radius:10px;padding:12px 14px}
    .stat-card .sl{font-size:12px;color:#64748B;margin-bottom:4px}
    .stat-card .sv{font-size:22px;font-weight:500}

    /* ── Queue filters ─────────────────────────────────────── */
    .filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
    .fb{padding:5px 12px;font-size:13px;border-radius:6px;border:0.5px solid #E2E8F0;
        background:#fff;color:#64748B;cursor:pointer;transition:all 0.1s}
    .fb.on{border-color:#BFDBFE;background:#EFF6FF;color:#1D4ED8;font-weight:500}
    .fb:hover:not(.on){background:#F8FAFC}
    .fsep{width:0.5px;height:20px;background:#E2E8F0}
    select{font-size:13px;padding:5px 8px;border-radius:6px;border:0.5px solid #E2E8F0;background:#fff;color:#0F172A}

    /* ── Queue table ───────────────────────────────────────── */
    .tcard{background:#fff;border:0.5px solid #E2E8F0;border-radius:12px;overflow:hidden}
    .thead{display:grid;grid-template-columns:76px 56px minmax(0,150px) minmax(0,180px) minmax(0,1fr) 80px;
           padding:7px 14px 7px 18px;background:#F8FAFC;border-bottom:0.5px solid #E2E8F0}
    .th{font-size:11px;font-weight:500;color:#94A3B8;letter-spacing:.03em}
    .trow{display:grid;grid-template-columns:76px 56px minmax(0,150px) minmax(0,180px) minmax(0,1fr) 80px;
          padding:10px 14px 10px 16px;align-items:center;border-bottom:0.5px solid #F1F5F9;transition:background 0.2s}
    .trow:last-child{border-bottom:none}
    .trow:hover{background:#FAFAFA}
    .trow.resolving{background:#F0FDF4}
    .trow.is-resolved{opacity:.5}
    .sev{font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap}
    .sev-error{background:#FEF2F2;color:#991B1B}
    .sev-warning{background:#FFFBEB;color:#92400E}
    .rule{font-size:11px;font-weight:500;color:#475569;font-family:monospace}
    .u-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .u-id{font-size:11px;color:#94A3B8;margin-top:1px}
    .c-ob{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .c-db{font-size:11px;color:#94A3B8;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .i-msg{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .i-diff{font-size:11px;color:#94A3B8;margin-top:2px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-res{font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;
             border:0.5px solid #A7F3D0;background:#F0FDF4;color:#059669;cursor:pointer}
    .btn-res:hover{opacity:.8}
    .btn-reo{font-size:12px;padding:4px 8px;border-radius:6px;border:none;background:none;color:#94A3B8;cursor:pointer}
    .btn-reo:hover{color:#64748B}
    .empty{padding:48px 20px;text-align:center}
    .empty i{font-size:28px;color:#10B981;display:block;margin-bottom:8px}
    .empty-t{font-size:14px;font-weight:500;margin-bottom:4px}
    .empty-s{font-size:13px;color:#64748B}
    .loading{padding:48px 20px;text-align:center;font-size:13px;color:#64748B}
    .count-label{font-size:12px;color:#94A3B8;margin-top:8px;text-align:right}
    .btn-sm{padding:5px 12px;font-size:13px;border-radius:6px;border:0.5px solid #E2E8F0;background:#fff;color:#64748B;cursor:pointer}
    .btn-sm:hover{background:#F8FAFC}

    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    .spin{display:inline-block;animation:spin 1s linear infinite;margin-right:6px}
  </style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Perry Weather — Hardware Validation</div>
      <div class="header-sub" id="queue-date">—</div>
    </div>
    <button class="btn-sm" id="refresh-btn" style="display:none" onclick="loadQueue()">
      <i class="ti ti-refresh" style="font-size:13px;vertical-align:-1px" aria-hidden="true"></i> Refresh
    </button>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-upload" onclick="switchTab('upload')">
      <i class="ti ti-upload" style="font-size:13px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>Upload
    </div>
    <div class="tab" id="tab-queue" onclick="switchTab('queue')">
      <i class="ti ti-list-check" style="font-size:13px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>Queue
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- UPLOAD PANEL                                               -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="panel-upload" class="panel active">
  <div class="inner">
    <h2>Weekly upload</h2>
    <p class="sub">Select both files to run the validation check</p>

    <div class="grid-2">
      <div id="z-ob" class="zone"
           onclick="document.getElementById('inp-ob').click()"
           ondragover="dov(event,'ob')" ondragleave="dlv('ob')" ondrop="drp(event,'ob')">
        <div id="inner-ob">
          <i class="ti ti-file-spreadsheet" aria-hidden="true"></i>
          <div class="zone-label">Unit Onboarding</div>
          <div class="zone-hint">.xlsx</div>
        </div>
      </div>
      <input type="file" id="inp-ob" accept=".xlsx,.xls" style="display:none" onchange="pick('ob',this.files[0])">

      <div id="z-hw" class="zone"
           onclick="document.getElementById('inp-hw').click()"
           ondragover="dov(event,'hw')" ondragleave="dlv('hw')" ondrop="drp(event,'hw')">
        <div id="inner-hw">
          <i class="ti ti-file-text" aria-hidden="true"></i>
          <div class="zone-label">Hardware Export</div>
          <div class="zone-hint">.csv</div>
        </div>
      </div>
      <input type="file" id="inp-hw" accept=".csv" style="display:none" onchange="pick('hw',this.files[0])">
    </div>

    <button id="run-btn" disabled onclick="runValidation()">Run validation</button>
    <div id="upload-status"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- QUEUE PANEL                                                -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="panel-queue" class="panel">
  <div class="inner-wide">

    <div class="stats">
      <div class="stat-card"><div class="sl">Open errors</div><div class="sv" id="s-err" style="color:#EF4444">—</div></div>
      <div class="stat-card"><div class="sl">Open warnings</div><div class="sv" id="s-warn" style="color:#F59E0B">—</div></div>
      <div class="stat-card"><div class="sl">Resolved</div><div class="sv" id="s-res" style="color:#10B981">—</div></div>
    </div>

    <div class="filters">
      <button class="fb on" id="f-open"     onclick="setFilter('status','open')">Open</button>
      <button class="fb"    id="f-all"      onclick="setFilter('status','all')">All</button>
      <button class="fb"    id="f-resolved" onclick="setFilter('status','resolved')">Resolved</button>
      <div class="fsep"></div>
      <select id="f-rule" onchange="setFilter('rule',this.value)">
        <option value="all">All checks</option>
      </select>
      <select id="f-sev" onchange="setFilter('sev',this.value)">
        <option value="all">All severities</option>
        <option value="error">Errors only</option>
        <option value="warning">Warnings only</option>
      </select>
    </div>

    <div class="tcard">
      <div class="thead">
        <span class="th">Severity</span>
        <span class="th">Rule</span>
        <span class="th">Unit</span>
        <span class="th">Customer</span>
        <span class="th">Issue</span>
        <span class="th"></span>
      </div>
      <div id="tbody"><div class="loading">Loading findings…</div></div>
    </div>
    <div id="count-lbl" class="count-label"></div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- SCRIPT                                                     -->
<!-- ══════════════════════════════════════════════════════════ -->
<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG — replace with your Supabase project values
//  URL:  Supabase dashboard → Settings → API → Project URL
//  KEY:  Supabase dashboard → Settings → API → anon / public key
// ─────────────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://kkqzzwwqbduejbluwrol.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrcXp6d3dxYmR1ZWpibHV3cm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTg2NDcsImV4cCI6MjA5NzIzNDY0N30.ABBBZ463WijmzfNFLVOxz7bZ9OGhtpPZjFbPEsbGe6Q'
// ─────────────────────────────────────────────────────────────

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ── Tab switching ─────────────────────────────────────────────

let queueLoaded = false

function switchTab(name) {
  ;['upload','queue'].forEach(t => {
    document.getElementById('panel-'+t).classList.toggle('active', t===name)
    document.getElementById('tab-'+t).classList.toggle('active', t===name)
  })
  document.getElementById('refresh-btn').style.display = name==='queue' ? 'block' : 'none'
  if (name==='queue' && !queueLoaded) loadQueue()
}

// ── Upload logic ──────────────────────────────────────────────

const F = { ob: null, hw: null }
const fmt = b => b<1024 ? b+' B' : b<1048576 ? Math.round(b/1024)+' KB' : (b/1048576).toFixed(1)+' MB'

function dov(e,t){ e.preventDefault(); document.getElementById('z-'+t).classList.add('over') }
function dlv(t){ document.getElementById('z-'+t).classList.remove('over') }
function drp(e,t){ e.preventDefault(); dlv(t); const f=e.dataTransfer.files[0]; if(f) pick(t,f) }

function pick(t, file) {
  if (!file) return
  F[t] = file
  document.getElementById('z-'+t).classList.remove('over')
  document.getElementById('z-'+t).classList.add('done')
  document.getElementById('inner-'+t).innerHTML = `
    <i class="ti ti-check" aria-hidden="true"></i>
    <div class="zone-fname">${file.name}</div>
    <div class="zone-fsize">${fmt(file.size)}</div>
  `
  if (F.ob && F.hw) {
    const b = document.getElementById('run-btn')
    b.disabled = false; b.classList.add('ready')
  }
}

function setUploadStatus(html) { document.getElementById('upload-status').innerHTML = html }

async function runValidation() {
  const btn = document.getElementById('run-btn')
  btn.disabled = true; btn.classList.remove('ready')

  try {
    btn.textContent = 'Creating batch…'

    const { data: batch, error: bErr } = await sb
      .from('upload_batches').insert({ status: 'pending' }).select().single()
    if (bErr) throw new Error('Could not create batch: ' + bErr.message)

    setUploadStatus(`<div class="card"><div class="card-title"><span class="spin">↻</span>Uploading files…</div><div class="card-sub">Writing to Supabase Storage</div></div>`)

    const [r1, r2] = await Promise.all([
      sb.storage.from('validation-uploads').upload(`${batch.id}/onboarding.xlsx`, F.ob),
      sb.storage.from('validation-uploads').upload(`${batch.id}/hardware_export.csv`, F.hw),
    ])
    if (r1.error) throw new Error('Onboarding upload failed: ' + r1.error.message)
    if (r2.error) throw new Error('Hardware export upload failed: ' + r2.error.message)

    setUploadStatus(`<div class="card c-info"><div class="card-title"><span class="spin">↻</span>Running validation…</div><div class="card-sub">Checking ${F.ob.name} against the hardware export</div></div>`)

    const { data: res, error: fErr } = await sb.functions.invoke('validate-batch', {
      body: { batch_id: batch.id }
    })
    if (fErr) throw new Error('Edge Function error: ' + fErr.message)
    if (!res?.success) throw new Error(res?.error || 'Validation returned an error')

    setUploadStatus(`
      <div class="card c-ok">
        <div class="card-title" style="margin-bottom:12px">✓ Validation complete</div>
        <div class="stat-row">
          <div class="stat-sm"><div class="sl">Errors</div><div class="sv" style="color:#EF4444">${res.errors}</div></div>
          <div class="stat-sm"><div class="sl">Warnings</div><div class="sv" style="color:#F59E0B">${res.warnings}</div></div>
          <div class="stat-sm"><div class="sl">Total</div><div class="sv">${res.findings}</div></div>
        </div>
        <button class="btn-ok" onclick="switchTab('queue');loadQueue()">View queue →</button>
        <button class="btn-ghost" onclick="resetUpload()">Upload another</button>
      </div>
    `)
    queueLoaded = false

  } catch (err) {
    setUploadStatus(`
      <div class="card c-err">
        <div class="card-title" style="color:#EF4444;margin-bottom:6px">Validation failed</div>
        <div class="card-sub" style="font-family:monospace;margin-bottom:12px">${err.message}</div>
        <button class="btn-ghost" onclick="resetUpload()">Try again</button>
      </div>
    `)
    btn.disabled = false; btn.classList.add('ready')
  }

  btn.textContent = 'Run validation'
}

function resetUpload() {
  F.ob = null; F.hw = null
  ;['ob','hw'].forEach(t => {
    const z = document.getElementById('z-'+t)
    z.classList.remove('done','over')
    const icon = t==='ob' ? 'ti-file-spreadsheet' : 'ti-file-text'
    const label = t==='ob' ? 'Unit Onboarding' : 'Hardware Export'
    const hint  = t==='ob' ? '.xlsx' : '.csv'
    document.getElementById('inner-'+t).innerHTML = `
      <i class="ti ${icon}" aria-hidden="true"></i>
      <div class="zone-label">${label}</div>
      <div class="zone-hint">${hint}</div>
    `
  })
  setUploadStatus('')
  const btn = document.getElementById('run-btn')
  btn.disabled = true; btn.classList.remove('ready'); btn.textContent = 'Run validation'
}

// ── Queue logic ───────────────────────────────────────────────

let ALL = []
let filters = { status: 'open', rule: 'all', sev: 'all' }

async function loadQueue() {
  document.getElementById('tbody').innerHTML = '<div class="loading">Loading findings…</div>'
  queueLoaded = true

  const { data, error } = await sb
    .from('hw_findings')
    .select('*')
    .order('severity')
    .order('created_at', { ascending: false })

  if (error) {
    document.getElementById('tbody').innerHTML = `<div class="loading" style="color:#EF4444">Failed to load: ${error.message}</div>`
    return
  }

  ALL = data || []

  if (ALL.length > 0) {
    const d = new Date(ALL[0].run_date + 'T12:00:00')
    document.getElementById('queue-date').textContent = 'Week of ' + d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
  } else {
    document.getElementById('queue-date').textContent = 'No findings yet'
  }

  const rules = [...new Set(ALL.map(f => f.rule_id))].sort()
  const sel = document.getElementById('f-rule')
  sel.innerHTML = '<option value="all">All checks</option>'
  rules.forEach(r => { const o=document.createElement('option'); o.value=r; o.textContent=r; sel.appendChild(o) })

  renderQueue()
}

function setFilter(key, val) {
  filters[key] = val
  if (key==='status')
    ;['open','all','resolved'].forEach(k => document.getElementById('f-'+k).classList.toggle('on', k===val))
  renderQueue()
}

function renderQueue() {
  const visible = ALL.filter(f => {
    if (filters.status!=='all' && f.status!==filters.status) return false
    if (filters.rule!=='all' && f.rule_id!==filters.rule) return false
    if (filters.sev!=='all' && f.severity!==filters.sev) return false
    return true
  })

  document.getElementById('s-err').textContent  = ALL.filter(f=>f.status==='open'&&f.severity==='error').length
  document.getElementById('s-warn').textContent = ALL.filter(f=>f.status==='open'&&f.severity==='warning').length
  document.getElementById('s-res').textContent  = ALL.filter(f=>f.status==='resolved').length

  const tbody = document.getElementById('tbody')
  const lbl   = document.getElementById('count-lbl')

  if (!visible.length) {
    tbody.innerHTML = `<div class="empty"><i class="ti ti-check" aria-hidden="true"></i><div class="empty-t">Nothing to show</div><div class="empty-s">${filters.status==='open'?'All open exceptions have been resolved.':'No findings match the current filters.'}</div></div>`
    lbl.textContent = ''
    return
  }

  lbl.textContent = visible.length + ' finding' + (visible.length!==1?'s':'') + ' shown'

  tbody.innerHTML = visible.map(f => {
    const isRes = f.status==='resolved'
    const sevCls = f.severity==='error' ? 'sev-error' : 'sev-warning'
    const lb = isRes ? 'border-left:3px solid #E2E8F0' : f.severity==='error' ? 'border-left:3px solid #EF4444' : 'border-left:3px solid #F59E0B'
    const uid = f.serial || f.ip_address || '—'
    const diff = f.expected && f.actual ? `${f.actual} → ${f.expected}` : ''
    const actionBtn = isRes
      ? `<button class="btn-reo" onclick="setFindingStatus('${f.id}','open')">Reopen</button>`
      : `<button class="btn-res" onclick="setFindingStatus('${f.id}','resolved')"><i class="ti ti-check" style="font-size:11px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Resolve</button>`

    return `<div id="row-${f.id}" class="trow${isRes?' is-resolved':''}" style="${lb}">
      <div><span class="sev ${sevCls}">${f.severity==='error'?'Error':'Warning'}</span></div>
      <div class="rule">${f.rule_id}</div>
      <div><div class="u-name">${f.unit_name||uid}</div><div class="u-id">${uid}</div></div>
      <div><div class="c-ob">${f.customer_site||f.customer||''}</div><div class="c-db">${f.db_customer||''}</div></div>
      <div><div class="i-msg">${f.message}</div>${diff?`<div class="i-diff">${diff}</div>`:''}</div>
      <div style="text-align:right">${actionBtn}</div>
    </div>`
  }).join('')
}

async function setFindingStatus(id, newStatus) {
  const row = document.getElementById('row-'+id)
  if (row) row.classList.add('resolving')

  const update = { status: newStatus, resolved_at: newStatus==='resolved' ? new Date().toISOString() : null }
  const { error } = await sb.from('hw_findings').update(update).eq('id', id)

  if (error) { alert('Failed to update: ' + error.message); if(row) row.classList.remove('resolving'); return }

  const f = ALL.find(x => x.id===id)
  if (f) { f.status=newStatus; f.resolved_at=update.resolved_at }
  renderQueue()
}

// Load queue on start so stats are ready
loadQueue()
</script>
</body>
</html>
